<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cours – Node Platform</title>
    
    <!-- Favicons -->
    <link rel="shortcut icon" href="css/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="./css/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./css/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./css/apple-touch-icon-180x180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./css/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="./css/apple-touch-icon-120x120.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./css/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./css/android-chrome-512x512.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── PDF Export Button ── */
        #pdfExportSection {
            display: flex;
            justify-content: flex-end;
            margin: 28px 0 8px;
        }

        #exportPdfBtn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: transparent;
            border: 1.5px solid var(--violet, #7c3aed);
            border-radius: 999px;
            color: var(--violet, #7c3aed);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.15s, box-shadow 0.2s;
            letter-spacing: 0.01em;
        }

        #exportPdfBtn:hover:not(:disabled) {
            background: var(--violet, #7c3aed);
            color: #fff;
            box-shadow: 0 4px 18px rgba(124,58,237,0.25);
            transform: translateY(-1px);
        }

        #exportPdfBtn:active:not(:disabled) {
            transform: translateY(0);
        }

        #exportPdfBtn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .pdf-btn-loader {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .spin { animation: spin 0.9s linear infinite; }
    </style>
</head>

<body>

    <div class="layout">

        <!-- Sidebar -->
        <aside>
            <select id="classFilter" aria-label="Filtrer par classe">
                <option value="">Toutes les classes</option>
            </select>
            <select id="subjectFilter" aria-label="Filtrer par matière">
                <option value="">Toutes les matières</option>
            </select>
            <a href="dashboard.html">← Retour au dashboard</a>
        </aside>

        <!-- Main Content -->
        <main id="course">
            
            <!-- Loader -->
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <span>Chargement du cours...</span>
            </div>

            <!-- Course Content -->
            <div id="courseContent"></div>

            <!-- PDF Export Button -->
            <div id="pdfExportSection">
                <button id="exportPdfBtn" aria-label="Télécharger le cours en PDF">
                    <span class="pdf-btn-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="12" y1="18" x2="12" y2="12"/>
                            <polyline points="9 15 12 18 15 15"/>
                        </svg>
                    </span>
                    <span class="pdf-btn-text">Télécharger en PDF</span>
                    <span class="pdf-btn-loader" style="display:none">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                        </svg>
                        Génération...
                    </span>
                </button>
            </div>

            <!-- Message Section -->
            <div id="courseMessageSection" class="card">
                <h3>💬 Une question sur ce cours ?</h3>
                <textarea 
                    id="messageInput" 
                    placeholder="Posez votre question ici... Les administrateurs vous répondront." 
                    rows="4" 
                    maxlength="350"
                    aria-label="Votre question"
                ></textarea>
                <p id="charCount">0 / 350</p>
                <button id="sendMessageBtn" aria-label="Envoyer la question">Envoyer</button>
                <p id="messageStatus" aria-live="polite"></p>
            </div>

        </main>

    </div>

    <!-- Reading Progress Bar -->
    <div id="readingProgress" role="progressbar" aria-label="Progression de lecture">
        <div class="bar"></div>
        <span class="time" id="chronoDisplay">00:00:00</span>
        <span class="label">0%</span>
    </div>

    <!-- Back to Top Button -->
    <button id="backToTop" class="back-to-top" aria-label="Retour en haut">↑</button>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            
            <div class="footer-brand">
                <h3>Node</h3>
                <p>Plateforme d'entraide scolaire collaborative.</p>
            </div>

            <nav class="footer-links" aria-label="Liens du footer">
                <a href="mentions-legales.html" class="footer-link">Mentions légales</a>
            </nav>

            <div class="footer-bottom">
                <p>© 2026 Node – Tous droits réservés</p>
            </div>

        </div>
    </footer>

    <!-- PDF Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Scripts -->
    <script type="module" src="js/course.js"></script>

</body>

</html>
